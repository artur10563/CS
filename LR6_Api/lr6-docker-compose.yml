version: "3.9"

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "MyStr0ng!Pass123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"

  graphql-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - sqlserver
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=ProductCatalogDb;User Id=sa;Password=MyStr0ng!Pass123;TrustServerCertificate=True
